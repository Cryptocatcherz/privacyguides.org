# Hugo configuration file
title: Privacy Guides

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderHooks:
      link:
        useEmbedded: always
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Tools
      pageRef: /tools
      weight: 1
    - name: Wiki
      pageRef: /wiki
      weight: 2
    - name: Activism
      pageRef: /activism
      weight: 3
    - identifier: updates
      name: Updates
      weight: 4
    - identifier: articles
      name: Articles
      pageRef: /posts/tag/articles/
      parent: updates
    - identifier: videos
      name: Videos
      pageRef: /videos/
      parent: updates
    - identifier: news
      name: News
      pageRef: /news/
      parent: updates
    - name: Forum  ↗
      url: "https://discuss.privacyguides.net"
      weight: 5
    - identifier: more
      name: More
      weight: 6
    - identifier: communitywiki
      name: Community Guides  ↗
      url: "https://discuss.privacyguides.net/c/community-wiki/9411/none"
      parent: more
    - identifier: about
      name: About
      pageRef: /about
      parent: more
    - identifier: glossary
      name: Glossary
      pageRef: /glossary
      parent: more
    - name: Search
      weight: 7
      params:
        type: search
    - name: Donate
      weight: 8
      pageRef: donate
      params:
        icon: heart

params:
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: "brand/logos/svg/logo/privacy-guides-logo.svg"
      dark: "brand/logos/svg/logo/privacy-guides-logo-dark.svg"
      link: "/"
      width: 185
      height: 24
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  # Display the author of the last modification
  displayUpdatedAuthor: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/privacyguides/privacyguides.org/edit/main/content"

  rss:
    sections: 
      - docs

enableGitInfo: true

outputs:
  home: [HTML, RSS]
  page: [HTML, markdown, RSS]
  section: [HTML, RSS]

defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1
