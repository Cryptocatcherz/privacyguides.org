# Hugo configuration file
title: Privacy Guides

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderHooks:
      link:
        useEmbedded: auto
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Recommendations
      pageRef: /tools
      weight: 1
    - name: Wiki
      pageRef: /wiki
      weight: 2
    - name: Activism
      pageRef: /activism
      weight: 3
    - name: Forum  ↗
      url: "https://discuss.privacyguides.net"
      weight: 4
    - identifier: updates
      name: Updates
      weight: 5
    - identifier: articles
      name: Articles
      pageRef: /posts/tag/articles/
      parent: updates
    - identifier: videos
      name: Videos
      pageRef: /videos/
      parent: updates
    - identifier: news
      name: News
      pageRef: /news/
      parent: updates
    - identifier: more
      name: More
      weight: 6
    - identifier: communitywiki
      name: Community Guides  ↗
      url: "https://discuss.privacyguides.net/c/community-wiki/9411/none"
      parent: more
    - identifier: about
      name: About
      pageRef: /about
      parent: more
    - name: Search
      weight: 7
      params:
        type: search
    - name: GitHub
      weight: 8
      url: "https://github.com/privacyguides/privacyguides.org"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/privacyguides/privacyguides.org/edit/main/content"
